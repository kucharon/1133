<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>回收管理系统 - 新增订单</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 头部 -->
    <div class="header">
        <div class="header-left">
            <i class="fas fa-arrow-left" onclick="navigateTo('home')"></i>
        </div>
        <div class="header-title">新增订单</div>
        <div class="header-right"></div>
    </div>
    
    <div class="container">
        <form onsubmit="submitOrder(); return false;">
            <!-- 客户信息 -->
            <div class="form-section">
                <span class="section-title">客户信息</span>
                
                <div class="form-item">
                    <input type="text" id="customer" class="form-input" placeholder="请输入客户姓名">
                </div>
                
                <div class="form-item">
                    <input type="tel" id="phone" class="form-input" placeholder="请输入联系电话">
                </div>
                
                <div class="form-item">
                    <input type="text" id="address" class="form-input" placeholder="请输入地址">
                </div>
            </div>
            
            <!-- 回收信息 -->
            <div class="form-section">
                <span class="section-title">回收信息</span>
                
                <div class="form-item">
                    <select id="category" class="form-select" onchange="selectCategory()">
                        <option value="">请选择品类</option>
                        <option value="大家电">大家电</option>
                        <option value="小数码">小数码</option>
                        <option value="小配件">小配件</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                
                <div class="form-item">
                    <input type="number" id="weight" class="form-input" placeholder="请输入重量(kg)" oninput="calculateAmount('weight', 'unitPrice', 'amount')">
                </div>
                
                <div class="form-item">
                    <input type="number" id="unitPrice" class="form-input" placeholder="请输入单价(元)" oninput="calculateAmount('weight', 'unitPrice', 'amount')">
                </div>
                
                <div class="form-item">
                    <input type="number" id="amount" class="form-input" placeholder="自动计算" disabled>
                </div>
            </div>
            
            <!-- 订单来源 -->
            <div class="form-section">
                <span class="section-title">订单来源</span>
                
                <div class="form-item">
                    <div class="radio-group">
                        <label class="radio-item active" data-source="业务员" onclick="setSource('业务员')">
                            <input type="radio" name="source" value="业务员" checked>
                            <span>业务员</span>
                        </label>
                        <label class="radio-item" data-source="门店" onclick="setSource('门店')">
                            <input type="radio" name="source" value="门店">
                            <span>门店</span>
                        </label>
                    </div>
                </div>
                
                <div class="form-item" id="salesman-field">
                    <input type="text" class="form-input" placeholder="请输入业务员姓名" value="张三">
                </div>
            </div>
            
            <!-- 提交按钮 -->
            <button type="submit" class="btn btn-primary">提交订单</button>
        </form>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
