<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>回收管理系统 - 我的</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 头部 -->
    <div class="header">
        <div class="header-left"></div>
        <div class="header-title">个人中心</div>
        <div class="header-right"></div>
    </div>
    
    <div class="container">
        <!-- 用户信息 -->
        <div class="card">
            <div style="display: flex; align-items: center;">
                <div class="customer-avatar" style="width: 80px; height: 80px; font-size: 32px;">
                    <span>管</span>
                </div>
                <div style="flex: 1; margin-left: 20px;">
                    <div style="font-size: 18px; font-weight: 600; color: #333; margin-bottom: 8px;">管理员</div>
                    <div style="font-size: 14px; color: #666; margin-bottom: 4px;">业务员账号</div>
                    <div style="font-size: 12px; color: #999;">admin@example.com</div>
                </div>
            </div>
        </div>
        
        <!-- 功能列表 -->
        <div class="profile-section">
            <div class="profile-item" onclick="showToast('功能开发中')">
                <i class="fas fa-id-card"></i>
                <span>个人信息</span>
                <i class="fas fa-chevron-right arrow"></i>
            </div>
            <div class="profile-item" onclick="showToast('功能开发中')">
                <i class="fas fa-bell"></i>
                <span>消息通知</span>
                <i class="fas fa-chevron-right arrow"></i>
            </div>
            <div class="profile-item" onclick="showToast('功能开发中')">
                <i class="fas fa-cog"></i>
                <span>设置</span>
                <i class="fas fa-chevron-right arrow"></i>
            </div>
            <div class="profile-item" onclick="showToast('功能开发中')">
                <i class="fas fa-question-circle"></i>
                <span>帮助中心</span>
                <i class="fas fa-chevron-right arrow"></i>
            </div>
            <div class="profile-item" onclick="showToast('功能开发中')">
                <i class="fas fa-info-circle"></i>
                <span>关于我们</span>
                <i class="fas fa-chevron-right arrow"></i>
            </div>
        </div>
        
        <!-- 退出登录 -->
        <button class="btn btn-secondary" onclick="logout()" style="margin-top: 32px;">
            退出登录
        </button>
        
        <!-- 版本信息 -->
        <div style="text-align: center; margin-top: 32px; font-size: 12px; color: #999;">
            版本 1.0.0
        </div>
    </div>
    
    <!-- 底部导航栏 -->
    <div class="tab-bar">
        <a href="home.html" class="tab-item">
            <i class="fas fa-home"></i>
            <span>首页</span>
        </a>
        <a href="orders.html" class="tab-item">
            <i class="fas fa-shopping-cart"></i>
            <span>订单</span>
        </a>
        <a href="customers.html" class="tab-item">
            <i class="fas fa-user"></i>
            <span>客户</span>
        </a>
        <a href="profile.html" class="tab-item active">
            <i class="fas fa-user-circle"></i>
            <span>我的</span>
        </a>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
