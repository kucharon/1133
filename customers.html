<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>回收管理系统 - 客户</title>
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 头部 -->
    <div class="header">
        <div class="header-left"></div>
        <div class="header-title">客户管理</div>
        <div class="header-right">
            <i class="fas fa-plus" onclick="showToast('添加客户功能开发中')"></i>
        </div>
    </div>
    
    <div class="container">
        <!-- 搜索框 -->
        <div style="margin-bottom: 16px;">
            <div style="position: relative;">
                <input type="text" placeholder="搜索客户..." class="form-input" style="padding-left: 40px;">
                <i class="fas fa-search" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #999;"></i>
            </div>
        </div>
        
        <!-- 客户列表 -->
        <div class="customer-list">
            <div class="customer-item">
                <div class="customer-avatar">
                    <span>张</span>
                </div>
                <div class="customer-info">
                    <div class="customer-name">张三</div>
                    <div class="customer-phone">138****1234</div>
                    <div class="customer-address">北京市朝阳区</div>
                </div>
                <div style="margin-left: 16px;">
                    <i class="fas fa-chevron-right" style="color: #999;"></i>
                </div>
            </div>
            
            <div class="customer-item">
                <div class="customer-avatar">
                    <span>李</span>
                </div>
                <div class="customer-info">
                    <div class="customer-name">李四</div>
                    <div class="customer-phone">139****5678</div>
                    <div class="customer-address">上海市浦东新区</div>
                </div>
                <div style="margin-left: 16px;">
                    <i class="fas fa-chevron-right" style="color: #999;"></i>
                </div>
            </div>
            
            <div class="customer-item">
                <div class="customer-avatar">
                    <span>王</span>
                </div>
                <div class="customer-info">
                    <div class="customer-name">王五</div>
                    <div class="customer-phone">137****9012</div>
                    <div class="customer-address">广州市天河区</div>
                </div>
                <div style="margin-left: 16px;">
                    <i class="fas fa-chevron-right" style="color: #999;"></i>
                </div>
            </div>
            
            <div class="customer-item">
                <div class="customer-avatar">
                    <span>赵</span>
                </div>
                <div class="customer-info">
                    <div class="customer-name">赵六</div>
                    <div class="customer-phone">136****3456</div>
                    <div class="customer-address">深圳市南山区</div>
                </div>
                <div style="margin-left: 16px;">
                    <i class="fas fa-chevron-right" style="color: #999;"></i>
                </div>
            </div>
            
            <div class="customer-item">
                <div class="customer-avatar">
                    <span>钱</span>
                </div>
                <div class="customer-info">
                    <div class="customer-name">钱七</div>
                    <div class="customer-phone">135****7890</div>
                    <div class="customer-address">杭州市西湖区</div>
                </div>
                <div style="margin-left: 16px;">
                    <i class="fas fa-chevron-right" style="color: #999;"></i>
                </div>
            </div>
        </div>
        
        <!-- 加载更多 -->
        <div class="load-more" onclick="loadMore()">
            <span>加载更多</span>
        </div>
    </div>
    
    <!-- 底部导航栏 -->
    <div class="tab-bar">
        <a href="home.html" class="tab-item">
            <i class="fas fa-home"></i>
            <span>首页</span>
        </a>
        <a href="orders.html" class="tab-item">
            <i class="fas fa-shopping-cart"></i>
            <span>订单</span>
        </a>
        <a href="customers.html" class="tab-item active">
            <i class="fas fa-user"></i>
            <span>客户</span>
        </a>
        <a href="profile.html" class="tab-item">
            <i class="fas fa-user-circle"></i>
            <span>我的</span>
        </a>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
